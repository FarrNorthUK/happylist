name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build version
        run: |
          TS="$(date +%Y%m%d%H%M%S)"
          sed -i "s/const CACHE = 'happylist-v[^']*'/const CACHE = 'happylist-v$TS'/" sw.js
          sed -i "s/const APP_VERSION = '[^']*'/const APP_VERSION = 'happylist-v$TS'/" js/app.js
          echo "{\"version\":\"happylist-v$TS\"}" > version.json
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
